{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>{{ post.title }}</title>
    <link rel="stylesheet" href="{% static 'css/article.css' %}">
</head>
<body class="article">
    <div class="header">
        <img class="logo" src="{% static 'img/logo.png' %}" alt="Логотип">
        <div style="position: absolute; top: 20px; right: 20px;">
            <a href="{% url 'register' %}" style="color: #ffffff; text-decoration: none; font-weight: bold;">Регистрация</a>
            {% if user.is_authenticated %}
                | <a href="{% url 'archive' %}" style="color: #ffffff;">Все статьи</a>
            {% endif %}
        </div>
    </div>
    <div class="article-content">
        <h1>{{ post.title }}</h1>
        <div class="article-info">
            <div class="article-author">{{ post.author.username }}</div>
            <div class="article-created-date">{{ post.created_date }}</div>
        </div>
        <p class="article-text">{{ post.text }}</p>
        <a href="{% url 'archive' %}" class="back-link">← Все записи</a>
    </div>
</body>
</html>
