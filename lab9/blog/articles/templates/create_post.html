{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Django Public Blog - создать статью</title>
    <link rel="stylesheet" href="{% static 'css/article.css' %}">
</head>
<body class="create" width="40px">
    <div class="header">
        <img class="logo" src="{% static 'img/logo.png' %}" alt="Логотип">
    </div>
    <div class="content">
        <h1>Написать статью</h1>
        <form method="POST">
            {% csrf_token %}
            <input type="text" name="title" placeholder="Название статьи" value="{{ form.title|default:'' }}">
            <textarea name="text" placeholder="Текст статьи">{{ form.text|default:'' }}</textarea>
            <input type="submit" value="Сохранить">
        </form>
        {% if form.errors %}
            <p style="color: #ff0000;">{{ form.errors }}</p>
        {% endif %}
    </div>
</body>
</html>
