{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Авторизация</title>
    <link rel="stylesheet" href="{% static 'css/article.css' %}">
</head>
<body class="auth">
    <div class="header">
        <img class="logo" src="{% static 'img/logo.png' %}" alt="Логотип">
    </div>
    <div class="content">
        <h1>Вход в аккаунт</h1>
        <form method="POST">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Никнейм" value="{{ request.POST.username|default:'' }}">
            <input type="password" name="password" placeholder="Пароль">
            <input type="submit" value="Войти">
        </form>
        {% if error %}<p style="color: #ff0000;">{{ error }}</p>{% endif %}
        <p>Нет аккаунта? <a href="{% url 'register' %}">Зарегистрироваться</a></p>
    </div>
</body>
</html>
