{% load static %}
<!DOCTYPE html>
<html>
    <head>
        <title>Создать новую статью/Блог</title>
        <link rel="stylesheet" href="{% static 'css/index.css' %}">
    </head>
    <body class="create-page-content">
        <div>
            <h1>Коллективный блог</h1>
        </div>
        <div class="create-page">
            <h1 class="create-page-header">Написать новую статью</h1>
            {% if errors %}
                <div class="error-message">
                    {% for error in errors %}
                        <div>{{ error }}</div>
                    {% endfor %}
                </div>
            {% endif %}
            <form method="POST" class="post-title">
                {% csrf_token %}
                <div class="form-group">
                    <label for="title">Название статьи</label>
                    <input type="text"
                            id="title"
                            name="title"
                            placeholder="Введите заголовок статьи"
                            value="{{ form.title }}"
                            required>
                    <div class="field-requirements">Уникальное название до 200 символов</div>
                </div>
                <div class="form-group">
                    <label for"text">Текст статьи</label>
                    <textarea id="text"
                                name="text"
                                placeholder="Напишите текст вашей статьи"
                                required>{{ form.text }}</textarea>
                    <div class="field-requirements">Минимум 10 символов</div>
                </div>
                <button type="submit" class="submit-btn">Опубликовать статью</button>
            </form>
            <div class="back-link">
                <a href="{% url 'archive' %}">Вернуться к списку статей</a>
            </div>
        </div>
    </body>
</html>
