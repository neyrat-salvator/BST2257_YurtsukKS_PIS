{% load static %}

<!DOCTYPE html>
<html>
    <head>
        <title>{{ post.title }} | Блог</title>
        <link rel="stylesheet" href="{% static 'css/index.css' %}">
    </head>
    <body>
        <div class="header">
            <h1>Блог</h1>
            <div class="user-menu">
                {% if user.is_authenticated %}
                    <span class="user-info">Привет, {{ user.username }}!</span>
                    <a href="{% url 'logout' %}">Выйти</a>
                {% else %}
                    <a href="{% url 'login' %}">Войти</a>
                    <a href="{% url 'register_view' %}">Регистрация</a>
                {% endif %}
            </div>
        </div>
        <div class="content">
            <h1 class="article-title">{{ post.title }}</h1>
            <div class="article-meta">
                <span class="article-author">{{ post.author.username }}</span>
                <span class="article-date">{{ post.created_date }}</span>
            </div>
            <div c lass="article-text">
                <p>{{ post.text|linebreaks }}</p>
            </div>
            <a href="{% url 'archive' %}" class="global-link">Все записи</a>
        </div>
    </body>
</html>
